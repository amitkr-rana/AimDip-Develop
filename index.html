.box{

}

input,select,button{

input,select{

}

select option{

}

input::placeholder{

}

input:focus,select:focus{
  border:1px solid #fff;

}

button{
  margin-top:18px;
  border:none;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(135deg,#ff6a00,#ee0979);
  color:#fff;

}

button:hover{

}

<script>
document.getElementById("syllabusForm").addEventListener("submit", async function (e) {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(this).entries());

  /* 🔥 FIX 1: "All" ko automatically Private bana do
     (Kyuki Amity Private me hai) */

  if (data.universityType === "All") {
    data.universityType = "Private";
  }

  /* 🔥 FIX 2: Integrated ke case me subject = program */
  if (data.course === "INT") {
    data.subject = data.program;
  }

  const response = await fetch("http://localhost:3000/submit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify(data),
  });

  const result = await response.json();

  if (result.redirectUrl) {
    window.location.href = result.redirectUrl;
  } else {
    alert("Something went wrong");
  }
});
</script>

// Helper for normalizing university names
function getUniversityKey(uniName) {
  if (!uniName) return "";
  return uniName.toLowerCase().replace(/,/g, "").replace(/’/g, "'").replace(/\s+/g, " ").trim();
}

// Normalized maps built once data is loaded
let normalizedUniversityCourses = {};
let normalizedUniversityProgramSubject = {};

window.addEventListener("DOMContentLoaded", async () => {
  try {
    const res = await fetch("/stateVsUniTypeVsUni.json");
    stateVsUniData = await res.json();
    
    // Build normalized lookup maps
    Object.keys(universityCourses).forEach(key => {
      normalizedUniversityCourses[getUniversityKey(key)] = universityCourses[key];
    });
    
    Object.keys(universityProgramSubject).forEach(key => {
      normalizedUniversityProgramSubject[getUniversityKey(key)] = universityProgramSubject[key];
    });

    // Populate State dropdown dynamically from JSON keys
    const stateSelect = document.getElementById("state");
    stateSelect.innerHTML = "<option value=''>Select State</option>";
    
    Object.keys(stateVsUniData).sort().forEach(s => {
      // Normalize state name for display (e.g. BIHAR -> Bihar)
      const displayName = s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
      stateSelect.add(new Option(displayName, s));
    });
  } catch (err) {
    console.error("Failed to load stateVsUniTypeVsUni.json", err);
  }
});

function stateChange() {
  const stateSelect = document.getElementById("state");
  const typeSelect = document.getElementById("universityType");
  const uniSelect = document.getElementById("university");
  
  typeSelect.innerHTML = "<option value=''>University Type</option>";
  uniSelect.innerHTML = "<option value=''>Select University</option>";
  document.getElementById("course").innerHTML = "<option value=''>Course</option>";
  document.getElementById("program").innerHTML = "<option value=''>Program</option>";
  
  const selectedState = stateSelect.value;
  if (!selectedState || !stateVsUniData[selectedState]) return;
  
  // Populate University Type dropdown from state keys
  const types = Object.keys(stateVsUniData[selectedState]).sort();
  types.forEach(t => {
    typeSelect.add(new Option(t, t));
  });
  // Add "All" option
  typeSelect.add(new Option("All", "all"));
}

function typeChange() {
  const stateSelect = document.getElementById("state");
  const typeSelect = document.getElementById("universityType");
  const uniSelect = document.getElementById("university");
  
  uniSelect.innerHTML = "<option value=''>Select University</option>";
  document.getElementById("course").innerHTML = "<option value=''>Course</option>";
  document.getElementById("program").innerHTML = "<option value=''>Program</option>";
  
  const selectedState = stateSelect.value;
  const selectedType = typeSelect.value;
  if (!selectedState || !selectedType || !stateVsUniData[selectedState]) return;
  
  if (selectedType === "all") {
    // Collect and de-duplicate universities across all types
    Object.keys(stateVsUniData[selectedState]).forEach(typeKey => {
      const list = stateVsUniData[selectedState][typeKey] || [];
      list.forEach(u => {
        if (!Array.from(uniSelect.options).some(opt => opt.value === u)) {
          uniSelect.add(new Option(u, u));
        }
      });
    });
  } else {
    const list = stateVsUniData[selectedState][selectedType] || [];
    list.forEach(u => {
      uniSelect.add(new Option(u, u));
    });
  }
}

function universityChange() {
  const uni = document.getElementById("university").value;
  const course = document.getElementById("course");
  const program = document.getElementById("program");

  course.innerHTML = "<option value=''>Course</option>";
  program.innerHTML = "<option value=''>Program</option>";

  const uniKey = getUniversityKey(uni);
  // Default fallback courses if university is not in universityCourses database
  const coursesList = normalizedUniversityCourses[uniKey] || ["UG", "PG", "PRO", "INT"];
  
  coursesList.forEach(c => {
    course.add(new Option(
      c === "UG" ? "UG" :
      c === "PG" ? "PG" :
      c === "PRO" ? "PROFESSIONAL" :
      c === "INT" ? "INTEGRATED" :
      c === "DOC" ? "Doctoral (PhD)" : c,
      c
    ));
  });
}

function courseChange() {
  const c = document.getElementById("course").value;
  const program = document.getElementById("program");
  const subject = document.getElementById("subject");

  program.innerHTML = "<option value=''>Program</option>";

  if (c === "INT") {
    subject.style.display = "none";
  } else {
    subject.style.display = (c === "UG" || c === "PG") ? "block" : "none";
  }

  programs[c]?.forEach(p => {
    if (typeof p === "object") {
      program.add(new Option(p.text, p.value));
    } else {
      program.add(new Option(p, p));
    }
  });
}

document.getElementById("program").addEventListener("change", function () {
  const uni = document.getElementById("university").value;
  const course = document.getElementById("course").value;
  const program = this.value;
  const subject = document.getElementById("subject");

  subject.innerHTML = "<option value=''>Subject</option>";

  const uniKey = getUniversityKey(uni);
  const subjectsMap = normalizedUniversityProgramSubject[uniKey];

  if (!subjectsMap || !subjectsMap[course] || !subjectsMap[course][program]) {
    subject.style.display = "none";
    return;
  }

  subject.style.display = "block";
  subjectsMap[course][program].forEach(s => {
    subject.add(new Option(s, s));
  });
});
